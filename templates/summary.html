<section id="panel-summary" class="panel active">
  <div class="panel-header">
    <h2>Driving Behavior Summary</h2>
    <p class="subtitle">Aggregated statistics for all drivers over the recorded period</p>
  </div>
  <p id="summary-status" class="panel-status hidden" role="status" aria-live="polite"></p>
  <div id="summary-table-wrap" class="table-wrap">
    <table id="summary-table">
      <thead>
        <tr>
          <th>Driver ID</th>
          <th>Plate Number</th>
          <th>Overspeed Count</th>
          <th>Overspeed Time (s)</th>
          <th>Fatigue Count</th>
          <th>Neutral Slide Count</th>
          <th>Neutral Slide Time (s)</th>
          <th>Rapid Speed-up</th>
          <th>Rapid Slowdown</th>
          <th>H-Throttle Stop</th>
          <th>Oil Leak</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>
